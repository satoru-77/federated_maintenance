services:
  backend:
    build:
      context: ./fl_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./fl_backend:/app

  dashboard:
    build:
      context: ./fl_shap_dashboard
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - backend
    volumes:
      - ./fl_shap_dashboard:/app
